# ════════════════════════════════════════════════════════════
# PROFIL PROD — utilisé sur Render
# Activé par : SPRING_PROFILES_ACTIVE=prod (variable d'env Render)
# AUCUNE valeur en dur ici — tout vient de variables d'environnement
# ════════════════════════════════════════════════════════════

# ─── Pas de logs SQL en prod (performance + sécurité) ────
spring.jpa.show-sql=false

# ─── Hibernate : valide juste, Flyway gère le schéma ─────
spring.jpa.hibernate.ddl-auto=update

# ─── Base de données PostgreSQL — variables Render ───────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ─── MQTT — HiveMQ Cloud (credentials via env Render) ────
mqtt.broker.url=ssl://53cc1d1dc297463f9f511baf26ee908e.s1.eu.hivemq.cloud:8883
mqtt.client.id=seaside-server-render
mqtt.topic=seaside/entrees/#,seaside/telemetry/#,seaside/alerte
mqtt.username=${MQTT_USERNAME}
mqtt.password=${MQTT_PASSWORD}

# ─── CORS — frontend déployé (via variable Render) ───────
#app.cors.allowed-origins=${ALLOWED_ORIGINS}
app.cors.allowed-origins=*

# ─── JWT secret — OBLIGATOIRE via variable Render ────────
# Ne jamais committer une vraie valeur ici
app.jwt.secret=${JWT_SECRET}

# ─── Port — Render injecte automatiquement PORT ──────────
server.port=${PORT:8080}