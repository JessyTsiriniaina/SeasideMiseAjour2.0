spring.application.name=seaside-api
spring.profiles.active=local



# ─── JPA / Hibernate ──────────────────────────────────────
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Flyway (migrations SQL) ──────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true


# ─── MQTT (ESP32) ─────────────────────────────────────────



# ─── MQTT (valeurs par défaut) ────────────────────────────
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=seaside-server
mqtt.topic=seaside/entrees/#
mqtt.username=
mqtt.password=

# ─── CORS (par défaut) ────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000


# ─── WebSocket ────────────────────────────────────────────
spring.websocket.enabled=true

# ─── Serveur ──────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api










# ─── Base de données PostgreSQL ───────────────────────────

spring.datasource.driver-class-name=org.postgresql.Driver


# Durée du token JWT (en millisecondes j'ai fais une heure)
app.jwt.expiration=3600000

# Durée du refresh token (en millisecondes la je fais 7jours)
app.jwt.refresh-expiration=604800000

# ─── JWT Cles ───────────────────
app.jwt.secret=SeasideSecretKeyTresLongueMinimum256BitsAAAAAAAAAAAAA