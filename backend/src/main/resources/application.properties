# ════════════════════════════════════════════════════════════
# FICHIER COMMUN — valeurs partagées par TOUS les profils
# Ne JAMAIS mettre ici une valeur qui change entre local/prod
# ════════════════════════════════════════════════════════════

spring.application.name=seaside-api

# Profil actif par défaut — Render le surchargera avec prod
spring.profiles.active=local

# ─── JPA / Hibernate (commun) ────────────────────────────
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Flyway (commun) ──────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── Driver PostgreSQL (commun) ───────────────────────────
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── WebSocket (commun) ───────────────────────────────────
spring.websocket.enabled=true

# ─── Serveur (commun) ─────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ─── JWT durées (communes) ────────────────────────────────
app.jwt.expiration=3600000
app.jwt.refresh-expiration=604800000

# ⚠️ app.jwt.secret n'est PAS ici — il va dans local ET prod
# séparément, car en prod il doit venir d'une variable d'env

# ─── JWT Cles ───────────────────


logging.level.org.eclipse.paho=DEBUG
logging.level.org.springframework.integration.mqtt=DEBUG