spring.application.name=seaside-api
spring.profiles.active=local



# ─── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Flyway (migrations SQL) ──────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true


# ─── MQTT (ESP32) ─────────────────────────────────────────
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id=seaside-server
mqtt.topic=seaside/entrees/#

# ─── WebSocket ────────────────────────────────────────────
spring.websocket.enabled=true

# ─── Serveur ──────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ─── CORS (pour React en dev) ─────────────────────────────
app.cors.allowed-origins=http://localhost:3000








# ─── Base de données PostgreSQL ───────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/seaside
spring.datasource.username=postgres
spring.datasource.driver-class-name=org.postgresql.Driver


# Durée du token JWT (en millisecondes)
app.jwt.expiration=3600000

# Durée du refresh token (en millisecondes)
app.jwt.refresh-expiration=604800000

# ─── JWT Cles ───────────────────
app.jwt.secret=SeasideSecretKeyTresLongueMinimum256BitsAAAAAAAAAAAAA